<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 650" width="100%" height="100%">
  <!-- Definitions for arrow markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#2563eb" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#ea580c" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#16a34a" />
    </marker>
  </defs>

  <style>
    .title { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 26px; font-weight: bold; fill: #1e1e1e; }
    .subtitle { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 16px; font-weight: bold; }
    .label { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 13px; font-weight: bold; }
    .cell-text { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 14px; font-weight: bold; fill: #71717a; }
    .card-text { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 13px; font-weight: bold; }
    .code-text { font-family: Consolas, 'Fira Code', Monaco, monospace; font-size: 13px; font-weight: bold; }
    .handdrawn { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" class="title">Speculative Covering Interval</text>

  <!-- ================= SCENARIO A ================= -->
  <!-- Container Box -->
  <rect x="30" y="70" width="840" height="230" rx="8" fill="#e6fffa" fill-opacity="0.15" stroke="#0d9488" stroke-width="2.2" class="handdrawn" />
  <rect x="31" y="69" width="838" height="231" rx="8" fill="none" stroke="#0d9488" stroke-width="1" opacity="0.6" class="handdrawn" />
  
  <text x="50" y="95" class="subtitle" fill="#0f766e">Hit: covering minimum is inside</text>

  <!-- Query Bracket [left, right) -->
  <line x1="220" y1="125" x2="540" y2="125" stroke="#16a34a" stroke-width="3" class="handdrawn" />
  <line x1="220" y1="118" x2="220" y2="132" stroke="#16a34a" stroke-width="2.5" class="handdrawn" />
  <line x1="540" y1="118" x2="540" y2="132" stroke="#16a34a" stroke-width="2.5" class="handdrawn" />
  
  <text x="380" y="112" text-anchor="middle" class="label" fill="#15803d">query [220, 540)</text>

  <!-- Block Grid (Block Size = 150px) -->
  <!-- Block 1 (x=160 to 310) -->
  <rect x="160" y="165" width="150" height="35" rx="4" fill="#f4f4f5" stroke="#a1a1aa" stroke-width="2" class="handdrawn" />
  <rect x="161" y="164" width="148" height="36" rx="4" fill="none" stroke="#a1a1aa" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="235" y="187" text-anchor="middle" class="cell-text">B1</text>

  <!-- Block 2 (x=310 to 460) -->
  <rect x="310" y="165" width="150" height="35" rx="4" fill="#f4f4f5" stroke="#a1a1aa" stroke-width="2" class="handdrawn" />
  <rect x="311" y="164" width="148" height="36" rx="4" fill="none" stroke="#a1a1aa" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="385" y="187" text-anchor="middle" class="cell-text">B2</text>

  <!-- Block 3 (x=460 to 610) -->
  <rect x="460" y="165" width="150" height="35" rx="4" fill="#f4f4f5" stroke="#a1a1aa" stroke-width="2" class="handdrawn" />
  <rect x="461" y="164" width="148" height="36" rx="4" fill="none" stroke="#a1a1aa" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="535" y="187" text-anchor="middle" class="cell-text">B3</text>

  <!-- Dashed grid boundaries -->
  <line x1="160" y1="150" x2="160" y2="210" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4,4" class="handdrawn" />
  <line x1="310" y1="150" x2="310" y2="210" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4,4" class="handdrawn" />
  <line x1="460" y1="150" x2="460" y2="210" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4,4" class="handdrawn" />
  <line x1="610" y1="150" x2="610" y2="210" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4,4" class="handdrawn" />

  <!-- Minimum position inside Block 2 (HIT) -->
  <circle cx="385" cy="182" r="14" fill="#d1fae5" stroke="#16a34a" stroke-width="2.5" class="handdrawn" />
  <circle cx="385" cy="182" r="14" fill="none" stroke="#16a34a" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="385" y="186" text-anchor="middle" font-family="Virgil" font-size="11" fill="#15803d" font-weight="bold">min</text>
  
  <!-- min_pos label and arrow pointing down, placed cleanly above block 2 -->
  <text x="385" y="145" text-anchor="middle" class="label" fill="#15803d">min = 385 inside</text>
  <line x1="385" y1="150" x2="385" y2="165" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow-green)" class="handdrawn" />

  <!-- Speculative covering interval bracket -->
  <line x1="160" y1="220" x2="610" y2="220" stroke="#2563eb" stroke-width="2.5" class="handdrawn" />
  <line x1="160" y1="213" x2="160" y2="227" stroke="#2563eb" stroke-width="2" class="handdrawn" />
  <line x1="610" y1="213" x2="610" y2="227" stroke="#2563eb" stroke-width="2" class="handdrawn" />
  <text x="385" y="240" text-anchor="middle" class="label" fill="#1d4ed8">cover [150, 600)</text>

  <!-- Condition Status Card -->
  <rect x="635" y="110" width="215" height="110" rx="5" fill="#ecfdf5" stroke="#10b981" stroke-width="2" class="handdrawn" />
  <rect x="636" y="109" width="213" height="112" rx="5" fill="none" stroke="#10b981" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="742" y="132" text-anchor="middle" class="card-text" fill="#065f46">cover min?</text>
  <text x="742" y="158" text-anchor="middle" class="code-text" fill="#047857">385 in [220, 540)</text>
  <text x="742" y="194" text-anchor="middle" class="card-text" fill="#15803d" font-size="14">return 385</text>


  <!-- ================= SCENARIO B ================= -->
  <!-- Container Box -->
  <rect x="30" y="320" width="840" height="300" rx="8" fill="#fff7ed" fill-opacity="0.15" stroke="#ea580c" stroke-width="2.2" class="handdrawn" />
  <rect x="31" y="319" width="838" height="301" rx="8" fill="none" stroke="#ea580c" stroke-width="1" opacity="0.6" class="handdrawn" />
  
  <text x="50" y="345" class="subtitle" fill="#c2410c">Miss: covering minimum is outside</text>

  <!-- Query Bracket [left, right) -->
  <line x1="220" y1="375" x2="540" y2="375" stroke="#16a34a" stroke-width="3" class="handdrawn" />
  <line x1="220" y1="368" x2="220" y2="382" stroke="#16a34a" stroke-width="2.5" class="handdrawn" />
  <line x1="540" y1="368" x2="540" y2="382" stroke="#16a34a" stroke-width="2.5" class="handdrawn" />
  
  <text x="380" y="362" text-anchor="middle" class="label" fill="#15803d">query [220, 540)</text>

  <!-- Block Grid (Block Size = 150px) -->
  <!-- Block 1 (x=160 to 310) -->
  <rect x="160" y="415" width="150" height="35" rx="4" fill="#f4f4f5" stroke="#a1a1aa" stroke-width="2" class="handdrawn" />
  <rect x="161" y="414" width="148" height="36" rx="4" fill="none" stroke="#a1a1aa" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="235" y="437" text-anchor="middle" class="cell-text">B1</text>

  <!-- Block 2 (x=310 to 460) -->
  <rect x="310" y="415" width="150" height="35" rx="4" fill="#f4f4f5" stroke="#a1a1aa" stroke-width="2" class="handdrawn" />
  <rect x="311" y="414" width="148" height="36" rx="4" fill="none" stroke="#a1a1aa" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="385" y="437" text-anchor="middle" class="cell-text">B2</text>

  <!-- Block 3 (x=460 to 610) -->
  <rect x="460" y="415" width="150" height="35" rx="4" fill="#f4f4f5" stroke="#a1a1aa" stroke-width="2" class="handdrawn" />
  <rect x="461" y="414" width="148" height="36" rx="4" fill="none" stroke="#a1a1aa" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="535" y="437" text-anchor="middle" class="cell-text">B3</text>

  <!-- Dashed grid boundaries, extended down to show query splitting alignments -->
  <line x1="160" y1="400" x2="160" y2="535" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4,4" class="handdrawn" />
  <line x1="310" y1="400" x2="310" y2="535" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4,4" class="handdrawn" />
  <line x1="460" y1="400" x2="460" y2="535" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4,4" class="handdrawn" />
  <line x1="610" y1="400" x2="610" y2="470" stroke="#71717a" stroke-width="1.5" stroke-dasharray="4,4" class="handdrawn" />

  <!-- Minimum position inside Block 1 overhang (MISS) -->
  <circle cx="180" cy="432.5" r="14" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5" class="handdrawn" />
  <circle cx="180" cy="432.5" r="14" fill="none" stroke="#dc2626" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="180" y="436.5" text-anchor="middle" font-family="Virgil" font-size="11" fill="#991b1b" font-weight="bold">min</text>
  
  <!-- min_pos label and arrow pointing down, placed cleanly below block 1 to avoid overlap -->
  <line x1="180" y1="450" x2="180" y2="475" stroke="#dc2626" stroke-width="1.5" marker-end="url(#arrow-orange)" class="handdrawn" />
  <text x="180" y="490" text-anchor="middle" class="label" fill="#991b1b">min = 180 outside</text>

  <!-- Speculative covering interval bracket -->
  <line x1="160" y1="470" x2="610" y2="470" stroke="#2563eb" stroke-width="2.5" class="handdrawn" />
  <line x1="160" y1="463" x2="160" y2="477" stroke="#2563eb" stroke-width="2" class="handdrawn" />
  <line x1="610" y1="463" x2="610" y2="477" stroke="#2563eb" stroke-width="2" class="handdrawn" />
  <text x="385" y="490" text-anchor="middle" class="label" fill="#1d4ed8">cover [150, 600)</text>

  <!-- Condition Status Card -->
  <rect x="635" y="360" width="215" height="110" rx="5" fill="#fff7ed" stroke="#f97316" stroke-width="2" class="handdrawn" />
  <rect x="636" y="359" width="213" height="112" rx="5" fill="none" stroke="#f97316" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="742" y="382" text-anchor="middle" class="card-text" fill="#7c2d12">cover min?</text>
  <text x="742" y="408" text-anchor="middle" class="code-text" fill="#9a3412">180 out of [220, 540)</text>
  <text x="742" y="444" text-anchor="middle" class="card-text" fill="#dc2626" font-size="14">split query</text>

  <!-- Split Query Illustration -->
  <!-- Left Border [left, 2B) -->
  <line x1="220" y1="525" x2="310" y2="525" stroke="#ea580c" stroke-width="2.2" class="handdrawn" />
  <line x1="220" y1="518" x2="220" y2="532" stroke="#ea580c" stroke-width="1.5" class="handdrawn" />
  <line x1="310" y1="518" x2="310" y2="532" stroke="#ea580c" stroke-width="1.5" class="handdrawn" />
  <text x="265" y="545" text-anchor="middle" class="label" fill="#c2410c">left edge</text>

  <!-- Middle Blocks [2B, 3B) -->
  <line x1="310" y1="525" x2="460" y2="525" stroke="#2563eb" stroke-width="2.2" class="handdrawn" />
  <line x1="310" y1="518" x2="310" y2="532" stroke="#2563eb" stroke-width="1.5" class="handdrawn" />
  <line x1="460" y1="518" x2="460" y2="532" stroke="#2563eb" stroke-width="1.5" class="handdrawn" />
  <text x="385" y="565" text-anchor="middle" class="label" fill="#1d4ed8">full blocks</text>

  <!-- Right Border [3B, right) -->
  <line x1="460" y1="525" x2="540" y2="525" stroke="#ea580c" stroke-width="2.2" class="handdrawn" />
  <line x1="460" y1="518" x2="460" y2="532" stroke="#ea580c" stroke-width="1.5" class="handdrawn" />
  <line x1="540" y1="518" x2="540" y2="532" stroke="#ea580c" stroke-width="1.5" class="handdrawn" />
  <text x="500" y="545" text-anchor="middle" class="label" fill="#c2410c">right edge</text>

  <!-- Standard Path merge -->
  <text x="385" y="605" text-anchor="middle" class="subtitle" fill="#1e1e1e">answer = min(left edge, full blocks, right edge)</text>
</svg>
