<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="820" viewBox="0 0 1200 820" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>CartesianTree8Example</title>
  <desc>Hand-drawn style min Cartesian tree for A = [5, 2, 7, 1, 6, 3, 4, 8], with the input array aligned above the tree nodes.</desc>

  <defs>
    <style>
      .label {
        font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive;
        font-size: 25px;
        fill: #1e1e1e;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .array-value {
        font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive;
        font-size: 28px;
        font-weight: bold;
        fill: #1e1e1e;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .edge {
        stroke: #555555;
        stroke-width: 3.2;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .edge-shadow {
        stroke: #555555;
        stroke-width: 2.2;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.55;
      }
      .node-outline {
        stroke-width: 3;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .node-rough {
        fill: none;
        stroke-width: 1.5;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.65;
      }
      .array-cell {
        fill: #fff3bf;
        stroke: #946200;
        stroke-width: 2.5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .array-cell-rough {
        fill: none;
        stroke: #946200;
        stroke-width: 1.1;
        stroke-linecap: round;
        stroke-linejoin: round;
        opacity: 0.55;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="820" fill="#ffffff"/>

  <!-- Input array. Each square is centered above the corresponding tree node. -->
  <rect x="91" y="38" width="58" height="58" rx="5" class="array-cell"/>
  <rect x="92" y="37" width="56" height="59" rx="5" class="array-cell-rough"/>
  <text class="array-value" x="120" y="68">5</text>

  <rect x="231" y="38" width="58" height="58" rx="5" class="array-cell"/>
  <rect x="232" y="37" width="56" height="59" rx="5" class="array-cell-rough"/>
  <text class="array-value" x="260" y="68">2</text>

  <rect x="371" y="38" width="58" height="58" rx="5" class="array-cell"/>
  <rect x="372" y="37" width="56" height="59" rx="5" class="array-cell-rough"/>
  <text class="array-value" x="400" y="68">7</text>

  <rect x="511" y="38" width="58" height="58" rx="5" class="array-cell"/>
  <rect x="512" y="37" width="56" height="59" rx="5" class="array-cell-rough"/>
  <text class="array-value" x="540" y="68">1</text>

  <rect x="651" y="38" width="58" height="58" rx="5" class="array-cell"/>
  <rect x="652" y="37" width="56" height="59" rx="5" class="array-cell-rough"/>
  <text class="array-value" x="680" y="68">6</text>

  <rect x="791" y="38" width="58" height="58" rx="5" class="array-cell"/>
  <rect x="792" y="37" width="56" height="59" rx="5" class="array-cell-rough"/>
  <text class="array-value" x="820" y="68">3</text>

  <rect x="931" y="38" width="58" height="58" rx="5" class="array-cell"/>
  <rect x="932" y="37" width="56" height="59" rx="5" class="array-cell-rough"/>
  <text class="array-value" x="960" y="68">4</text>

  <rect x="1071" y="38" width="58" height="58" rx="5" class="array-cell"/>
  <rect x="1072" y="37" width="56" height="59" rx="5" class="array-cell-rough"/>
  <text class="array-value" x="1100" y="68">8</text>

  <!-- Edges are drawn twice with slight offsets to mimic Excalidraw roughness. -->
  <path class="edge-shadow" d="M514 275 C469 305 381 338 300 364"/>
  <path class="edge" d="M516 277 C466 304 380 340 302 366"/>

  <path class="edge-shadow" d="M586 275 C632 306 716 338 780 364"/>
  <path class="edge" d="M584 277 C632 304 718 340 782 366"/>

  <path class="edge-shadow" d="M230 426 C202 458 169 485 144 517"/>
  <path class="edge" d="M232 428 C200 458 170 486 146 518"/>

  <path class="edge-shadow" d="M310 426 C332 458 358 485 376 517"/>
  <path class="edge" d="M308 428 C334 458 360 486 378 518"/>

  <path class="edge-shadow" d="M790 426 C762 458 729 485 704 517"/>
  <path class="edge" d="M792 428 C760 458 730 486 706 518"/>

  <path class="edge-shadow" d="M870 426 C892 458 918 485 936 517"/>
  <path class="edge" d="M868 428 C894 458 920 486 938 518"/>

  <path class="edge-shadow" d="M1010 578 C1032 610 1058 638 1076 669"/>
  <path class="edge" d="M1008 580 C1034 610 1060 639 1078 670"/>

  <!-- Root. -->
  <ellipse cx="540" cy="244" rx="64" ry="32" fill="#dbe4ff" stroke="#315f8c" class="node-outline"/>
  <path d="M477 242 C480 222 506 211 539 211 C576 211 602 224 604 246 C605 265 579 277 540 277 C503 277 476 265 477 242Z"
        stroke="#315f8c" class="node-rough"/>
  <text class="label" x="540" y="244">A[3]=1</text>

  <!-- Level 1. -->
  <ellipse cx="260" cy="396" rx="64" ry="32" fill="#dbe4ff" stroke="#315f8c" class="node-outline"/>
  <path d="M198 394 C199 375 225 362 260 363 C295 363 323 376 324 398 C323 416 296 429 260 429 C224 429 197 415 198 394Z"
        stroke="#315f8c" class="node-rough"/>
  <text class="label" x="260" y="396">A[1]=2</text>

  <ellipse cx="820" cy="396" rx="64" ry="32" fill="#dbe4ff" stroke="#315f8c" class="node-outline"/>
  <path d="M758 394 C759 375 785 362 820 363 C855 363 883 376 884 398 C883 416 856 429 820 429 C784 429 757 415 758 394Z"
        stroke="#315f8c" class="node-rough"/>
  <text class="label" x="820" y="396">A[5]=3</text>

  <!-- Level 2. -->
  <ellipse cx="120" cy="548" rx="64" ry="32" fill="#dbe4ff" stroke="#315f8c" class="node-outline"/>
  <path d="M58 546 C59 527 85 514 120 515 C155 515 183 528 184 550 C183 568 156 581 120 581 C84 581 57 567 58 546Z"
        stroke="#315f8c" class="node-rough"/>
  <text class="label" x="120" y="548">A[0]=5</text>

  <ellipse cx="400" cy="548" rx="64" ry="32" fill="#dbe4ff" stroke="#315f8c" class="node-outline"/>
  <path d="M338 546 C339 527 365 514 400 515 C435 515 463 528 464 550 C463 568 436 581 400 581 C364 581 337 567 338 546Z"
        stroke="#315f8c" class="node-rough"/>
  <text class="label" x="400" y="548">A[2]=7</text>

  <ellipse cx="680" cy="548" rx="64" ry="32" fill="#dbe4ff" stroke="#315f8c" class="node-outline"/>
  <path d="M618 546 C619 527 645 514 680 515 C715 515 743 528 744 550 C743 568 716 581 680 581 C644 581 617 567 618 546Z"
        stroke="#315f8c" class="node-rough"/>
  <text class="label" x="680" y="548">A[4]=6</text>

  <ellipse cx="960" cy="548" rx="64" ry="32" fill="#dbe4ff" stroke="#315f8c" class="node-outline"/>
  <path d="M898 546 C899 527 925 514 960 515 C995 515 1023 528 1024 550 C1023 568 996 581 960 581 C924 581 897 567 898 546Z"
        stroke="#315f8c" class="node-rough"/>
  <text class="label" x="960" y="548">A[6]=4</text>

  <!-- Level 3. -->
  <ellipse cx="1100" cy="700" rx="64" ry="32" fill="#dbe4ff" stroke="#315f8c" class="node-outline"/>
  <path d="M1038 698 C1039 679 1065 666 1100 667 C1135 667 1163 680 1164 702 C1163 720 1136 733 1100 733 C1064 733 1037 719 1038 698Z"
        stroke="#315f8c" class="node-rough"/>
  <text class="label" x="1100" y="700">A[7]=8</text>
</svg>
