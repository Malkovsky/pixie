<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <!-- Definitions for arrow markers -->
  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#4a9eed" />
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#f59e0b" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#22c55e" />
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#b0b0b0" />
    </marker>
  </defs>

  <style>
    .title { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 26px; font-weight: bold; fill: #1e1e1e; }
    .label { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 16px; fill: #1e1e1e; font-weight: bold; }
    .slot-idx { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 14px; fill: #757575; font-weight: bold; }
    .cell-text { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 22px; font-weight: bold; fill: #1e1e1e; }
    .cell-text-min { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 24px; font-weight: bold; fill: #15803d; }
    .scan-text { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 14px; font-weight: bold; }
    .explain-title { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 16px; font-weight: bold; }
    .explain-text { font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive; font-size: 13px; fill: #4b5563; font-weight: bold; }
    .code-text { font-family: Consolas, 'Fira Code', Monaco, monospace; font-size: 11px; fill: #1e1e1e; font-weight: bold; }
    .handdrawn { stroke-linecap: round; stroke-linejoin: round; }
  </style>

  <!-- Title -->
  <text x="400" y="45" text-anchor="middle" class="title">Prefix/Suffix Mask Leaf Optimization</text>

  <!-- Main Background Container (Excalidraw Double-Stroke Style) -->
  <rect x="20" y="80" width="760" height="320" rx="8" fill="#e5dbff" fill-opacity="0.15" stroke="#8b5cf6" stroke-width="2.5" class="handdrawn" />
  <rect x="21" y="79" width="758" height="321" rx="8" fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.65" class="handdrawn" />

  <!-- Row Headers -->
  <text x="45" y="118" class="label" fill="#1e1e1e">Index:</text>
  <text x="45" y="165" class="label" fill="#1e1e1e">Input Value:</text>
  <text x="45" y="312" class="label" fill="#1e1e1e">Mask:</text>

  <!-- Sequence Cells and Mask Cells with handdrawn double-lines -->
  <!-- Cell 0 (5, prefix) -->
  <rect x="160" y="135" width="60" height="50" rx="5" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2.5" class="handdrawn" />
  <rect x="161" y="134" width="59" height="51" rx="5" fill="none" stroke="#4a9eed" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="190" y="118" text-anchor="middle" class="slot-idx">[0]</text>
  <text x="190" y="166" text-anchor="middle" class="cell-text">5</text>
  
  <rect x="160" y="285" width="60" height="45" rx="5" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2.5" class="handdrawn" />
  <rect x="161" y="284" width="59" height="46" rx="5" fill="none" stroke="#4a9eed" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="190" y="313" text-anchor="middle" class="cell-text">1</text>
  
  <line x1="190" y1="185" x2="190" y2="280" stroke="#4a9eed" stroke-width="2.5" marker-end="url(#arrow-blue)" class="handdrawn" />
  <line x1="191" y1="184" x2="191" y2="278" stroke="#4a9eed" stroke-width="1.2" opacity="0.5" class="handdrawn" />

  <!-- Cell 1 (2, prefix) -->
  <rect x="230" y="135" width="60" height="50" rx="5" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2.5" class="handdrawn" />
  <rect x="231" y="134" width="59" height="51" rx="5" fill="none" stroke="#4a9eed" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="260" y="118" text-anchor="middle" class="slot-idx">[1]</text>
  <text x="260" y="166" text-anchor="middle" class="cell-text">2</text>
  
  <rect x="230" y="285" width="60" height="45" rx="5" fill="#a5d8ff" stroke="#4a9eed" stroke-width="2.5" class="handdrawn" />
  <rect x="231" y="284" width="59" height="46" rx="5" fill="none" stroke="#4a9eed" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="260" y="313" text-anchor="middle" class="cell-text">1</text>
  
  <line x1="260" y1="185" x2="260" y2="280" stroke="#4a9eed" stroke-width="2.5" marker-end="url(#arrow-blue)" class="handdrawn" />
  <line x1="261" y1="184" x2="261" y2="278" stroke="#4a9eed" stroke-width="1.2" opacity="0.5" class="handdrawn" />

  <!-- Cell 2 (7, none) -->
  <rect x="300" y="135" width="60" height="50" rx="5" fill="#ffffff" stroke="#757575" stroke-width="2" class="handdrawn" />
  <rect x="301" y="134" width="59" height="51" rx="5" fill="none" stroke="#757575" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="330" y="118" text-anchor="middle" class="slot-idx">[2]</text>
  <text x="330" y="166" text-anchor="middle" class="cell-text">7</text>
  
  <rect x="300" y="285" width="60" height="45" rx="5" fill="#ffffff" stroke="#757575" stroke-width="2" class="handdrawn" />
  <rect x="301" y="284" width="59" height="46" rx="5" fill="none" stroke="#757575" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="330" y="313" text-anchor="middle" class="cell-text">0</text>
  
  <line x1="330" y1="185" x2="330" y2="280" stroke="#b0b0b0" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-gray)" class="handdrawn" />

  <!-- Cell 3 (1, global min) -->
  <rect x="370" y="135" width="60" height="50" rx="5" fill="#b2f2bb" stroke="#22c55e" stroke-width="3.5" class="handdrawn" />
  <rect x="369" y="136" width="61" height="49" rx="5" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.6" class="handdrawn" />
  <text x="400" y="118" text-anchor="middle" class="slot-idx" style="fill: #15803d;">[3]</text>
  <text x="400" y="167" text-anchor="middle" class="cell-text-min">1</text>
  
  <rect x="370" y="285" width="60" height="45" rx="5" fill="#b2f2bb" stroke="#22c55e" stroke-width="3" class="handdrawn" />
  <rect x="369" y="286" width="61" height="44" rx="5" fill="none" stroke="#22c55e" stroke-width="1.5" opacity="0.6" class="handdrawn" />
  <text x="400" y="313" text-anchor="middle" class="cell-text">1</text>
  
  <line x1="400" y1="185" x2="400" y2="280" stroke="#22c55e" stroke-width="3" marker-end="url(#arrow-green)" class="handdrawn" />
  <line x1="401" y1="184" x2="401" y2="278" stroke="#22c55e" stroke-width="1.2" opacity="0.5" class="handdrawn" />

  <!-- Cell 4 (6, none) -->
  <rect x="440" y="135" width="60" height="50" rx="5" fill="#ffffff" stroke="#757575" stroke-width="2" class="handdrawn" />
  <rect x="441" y="134" width="59" height="51" rx="5" fill="none" stroke="#757575" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="470" y="118" text-anchor="middle" class="slot-idx">[4]</text>
  <text x="470" y="166" text-anchor="middle" class="cell-text">6</text>
  
  <rect x="440" y="285" width="60" height="45" rx="5" fill="#ffffff" stroke="#757575" stroke-width="2" class="handdrawn" />
  <rect x="441" y="284" width="59" height="46" rx="5" fill="none" stroke="#757575" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="470" y="313" text-anchor="middle" class="cell-text">0</text>
  
  <line x1="470" y1="185" x2="470" y2="280" stroke="#b0b0b0" stroke-width="1.5" stroke-dasharray="4,4" marker-end="url(#arrow-gray)" class="handdrawn" />

  <!-- Cell 5 (3, suffix) -->
  <rect x="510" y="135" width="60" height="50" rx="5" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2.5" class="handdrawn" />
  <rect x="511" y="134" width="59" height="51" rx="5" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="540" y="118" text-anchor="middle" class="slot-idx">[5]</text>
  <text x="540" y="166" text-anchor="middle" class="cell-text">3</text>
  
  <rect x="510" y="285" width="60" height="45" rx="5" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2.5" class="handdrawn" />
  <rect x="511" y="284" width="59" height="46" rx="5" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="540" y="313" text-anchor="middle" class="cell-text">1</text>
  
  <line x1="540" y1="185" x2="540" y2="280" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-orange)" class="handdrawn" />
  <line x1="541" y1="184" x2="541" y2="278" stroke="#f59e0b" stroke-width="1.2" opacity="0.5" class="handdrawn" />

  <!-- Cell 6 (4, suffix) -->
  <rect x="580" y="135" width="60" height="50" rx="5" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2.5" class="handdrawn" />
  <rect x="581" y="134" width="59" height="51" rx="5" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="610" y="118" text-anchor="middle" class="slot-idx">[6]</text>
  <text x="610" y="166" text-anchor="middle" class="cell-text">4</text>
  
  <rect x="580" y="285" width="60" height="45" rx="5" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2.5" class="handdrawn" />
  <rect x="581" y="284" width="59" height="46" rx="5" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="610" y="313" text-anchor="middle" class="cell-text">1</text>
  
  <line x1="610" y1="185" x2="610" y2="280" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-orange)" class="handdrawn" />
  <line x1="611" y1="184" x2="611" y2="278" stroke="#f59e0b" stroke-width="1.2" opacity="0.5" class="handdrawn" />

  <!-- Cell 7 (8, suffix) -->
  <rect x="650" y="135" width="60" height="50" rx="5" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2.5" class="handdrawn" />
  <rect x="651" y="134" width="59" height="51" rx="5" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="680" y="118" text-anchor="middle" class="slot-idx">[7]</text>
  <text x="680" y="166" text-anchor="middle" class="cell-text">8</text>
  
  <rect x="650" y="285" width="60" height="45" rx="5" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2.5" class="handdrawn" />
  <rect x="651" y="284" width="59" height="46" rx="5" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.6" class="handdrawn" />
  <text x="680" y="313" text-anchor="middle" class="cell-text">1</text>
  
  <line x1="680" y1="185" x2="680" y2="280" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-orange)" class="handdrawn" />
  <line x1="681" y1="184" x2="681" y2="278" stroke="#f59e0b" stroke-width="1.2" opacity="0.5" class="handdrawn" />

  <!-- Scans -->
  <!-- Prefix Arrow (L to R) -->
  <text x="45" y="215" class="scan-text" fill="#2563eb">Forward Scan:</text>
  <line x1="160" y1="211" x2="410" y2="211" stroke="#4a9eed" stroke-width="2.5" marker-end="url(#arrow-blue)" class="handdrawn" />
  <line x1="160" y1="212" x2="408" y2="212" stroke="#4a9eed" stroke-width="1.2" opacity="0.5" class="handdrawn" />
  <text x="285" y="206" text-anchor="middle" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Chalkboard SE', cursive" font-size="12" fill="#2563eb" font-weight="bold">Discovered minimums: 5, 2, 1</text>

  <!-- Suffix Arrow (R to L) -->
  <text x="45" y="245" class="scan-text" fill="#b45309">Backward Scan:</text>
  <line x1="710" y1="241" x2="390" y2="241" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#arrow-orange)" class="handdrawn" />
  <line x1="710" y1="242" x2="392" y2="242" stroke="#f59e0b" stroke-width="1.2" opacity="0.5" class="handdrawn" />
  <text x="550" y="236" text-anchor="middle" font-family="Virgil, 'Segoe Print', 'Comic Sans MS', 'Chalkboard SE', cursive" font-size="12" fill="#b45309" font-weight="bold">Discovered minimums: 8, 4, 3, 1</text>

  <!-- Info box -->
  <rect x="160" y="345" width="550" height="40" rx="5" fill="#fff3bf" stroke="#f59e0b" stroke-width="2" class="handdrawn" />
  <rect x="161" y="344" width="548" height="41" rx="5" fill="none" stroke="#f59e0b" stroke-width="1.2" opacity="0.65" class="handdrawn" />
  <text x="435" y="370" text-anchor="middle" font-family="Virgil, 'Segoe Print', cursive" font-size="15" fill="#1e1e1e" font-weight="bold">
    Embedded Local Min Pos = 3  |  Mask Word = 11101011 (0xEB)
  </text>

  <!-- Query Answering Modes Header -->
  <text x="400" y="425" text-anchor="middle" font-family="Virgil, 'Segoe Print', cursive" font-size="19" font-weight="bold" fill="#1e1e1e">
    Query Answering Modes
  </text>

  <!-- Mode A Box -->
  <rect x="20" y="440" width="240" height="145" rx="6" fill="#d3f9d8" stroke="#22c55e" stroke-width="2" class="handdrawn" />
  <rect x="19" y="441" width="241" height="143" rx="6" fill="none" stroke="#22c55e" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="140" y="462" text-anchor="middle" class="explain-title" fill="#15803d">A: Crosses Global Min</text>
  <text x="140" y="480" text-anchor="middle" class="explain-text">Condition: <tspan font-weight="bold">l ≤ min_pos &lt; r</tspan></text>
  
  <text x="30" y="505" xml:space="preserve" class="code-text" fill="#15803d">if (l &lt;= min_pos &amp;&amp; min_pos &lt; r)</text>
  <text x="30" y="520" xml:space="preserve" class="code-text" fill="#15803d">  return min_pos;</text>
  
  <text x="140" y="555" text-anchor="middle" class="explain-text" style="font-weight: bold; fill: #115e59;">Query [1, 5) → Returns Index 3</text>

  <!-- Mode B Box -->
  <rect x="280" y="440" width="240" height="145" rx="6" fill="#dbe4ff" stroke="#4a9eed" stroke-width="2" class="handdrawn" />
  <rect x="279" y="441" width="241" height="143" rx="6" fill="none" stroke="#4a9eed" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="400" y="462" text-anchor="middle" class="explain-title" fill="#1e3a8a">B: Prefix Range [0, r)</text>
  <text x="400" y="480" text-anchor="middle" class="explain-text">Condition: <tspan font-weight="bold">l == 0 and r ≤ min_pos</tspan></text>
  
  <text x="290" y="505" xml:space="preserve" class="code-text" fill="#1e3a8a">uint64_t m = mask &amp; ((1ULL&lt;&lt;r)-1);</text>
  <text x="290" y="520" xml:space="preserve" class="code-text" fill="#1e3a8a">return 63 - std::countl_zero(m);</text>
  
  <text x="400" y="555" text-anchor="middle" class="explain-text" style="font-weight: bold; fill: #1e3a8a;">Query [0, 3) → Returns Index 1</text>

  <!-- Mode C Box -->
  <rect x="540" y="440" width="240" height="145" rx="6" fill="#ffd8a8" stroke="#f59e0b" stroke-width="2" class="handdrawn" />
  <rect x="539" y="441" width="241" height="143" rx="6" fill="none" stroke="#f59e0b" stroke-width="1" opacity="0.6" class="handdrawn" />
  <text x="660" y="462" text-anchor="middle" class="explain-title" fill="#b45309">C: Suffix Range [l, N)</text>
  <text x="660" y="480" text-anchor="middle" class="explain-text">Condition: <tspan font-weight="bold">r == N and l &gt; min_pos</tspan></text>
  
  <text x="550" y="505" xml:space="preserve" class="code-text" fill="#b45309">uint64_t m = mask &amp; ~((1ULL&lt;&lt;l)-1);</text>
  <text x="550" y="520" xml:space="preserve" class="code-text" fill="#b45309">return std::countr_zero(m);</text>
  
  <text x="660" y="555" text-anchor="middle" class="explain-text" style="font-weight: bold; fill: #7c2d12;">Query [4, 8) → Returns Index 5</text>
</svg>
