    <rect class="head-cell" x="670" y="106" width="52" height="34" rx="4"/><text class="code" x="696" y="123">9</text>
    <rect class="head-cell" x="722" y="106" width="52" height="34" rx="4"/><text class="code" x="748" y="123">10</text>
    <rect class="head-cell" x="774" y="106" width="52" height="34" rx="4"/><text class="code" x="800" y="123">11</text>
    <rect class="head-cell" x="826" y="106" width="52" height="34" rx="4"/><text class="code" x="852" y="123">12</text>
