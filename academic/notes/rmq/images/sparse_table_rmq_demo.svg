    <rect class="cell" x="566" y="250" width="52" height="34" rx="4"/><text class="code" x="592" y="267">8</text>
    <rect class="cell" x="618" y="250" width="52" height="34" rx="4"/><text class="code" x="644" y="267">8</text>
    <rect class="cell" x="670" y="250" width="52" height="34" rx="4"/><text class="code" x="696" y="267">9</text>
    <rect class="cell" x="722" y="250" width="52" height="34" rx="4"/><text class="code" x="748" y="267">10</text>
    <rect class="cell" x="774" y="250" width="52" height="34" rx="4"/><text class="code" x="800" y="267">12</text>
    <rect class="cell" x="826" y="250" width="52" height="34" rx="4"/><text class="code" x="852" y="267">12</text>
    <rect class="cell" x="878" y="250" width="52" height="34" rx="4"/><text class="code" x="904" y="267">14</text>
