    <rect class="array-cell" x="774" y="150" width="52" height="34" rx="4"/><text class="code" x="800" y="167">12</text>
    <rect class="result" x="826" y="150" width="52" height="34" rx="4"/><text class="code" x="852" y="167">0</text>
    <rect class="array-cell" x="878" y="150" width="52" height="34" rx="4"/><text class="code" x="904" y="167">14</text>
