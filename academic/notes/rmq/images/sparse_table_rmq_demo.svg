<?xml version="1.0" encoding="UTF-8"?>
<svg width="1200" height="720" viewBox="0 0 1200 720" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Sparse Table RMQ Demonstration</title>
  <desc>Hand-drawn style sparse table diagram. Rows store arg-min positions for intervals of length 2^k. A query is answered by two overlapping intervals.</desc>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1.5 L 10 5 L 0 8.5 z" fill="#ea580c"/>
    </marker>
    <style>
      .title {
        font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive;
        font-size: 30px;
        font-weight: bold;
        fill: #1e1e1e;
        text-anchor: middle;
      }
      .label {
        font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive;
        font-size: 18px;
        font-weight: bold;
        fill: #1e1e1e;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .small {
        font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive;
        font-size: 14px;
        font-weight: bold;
        fill: #52525b;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .tiny {
        font-family: "Virgil", "Segoe Print", "Comic Sans MS", "Chalkboard SE", cursive;
        font-size: 12px;
        fill: #71717a;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .code {
        font-family: Consolas, "Fira Code", Monaco, monospace;
        font-size: 17px;
        font-weight: bold;
        fill: #27272a;
        text-anchor: middle;
        dominant-baseline: central;
      }
      .hand {
        stroke-linecap: round;
        stroke-linejoin: round;
      }
      .cell {
        fill: #f8fafc;
        stroke: #94a3b8;
        stroke-width: 1.8;
      }
      .head-cell {
        fill: #e0f2fe;
        stroke: #0369a1;
        stroke-width: 1.8;
      }
      .array-cell {
        fill: #fef3c7;
        stroke: #a16207;
        stroke-width: 1.8;
      }
      .blank-cell {
        fill: #f4f4f5;
        stroke: #d4d4d8;
        stroke-width: 1.4;
      }
      .hit-left {
        fill: #dbeafe;
        stroke: #2563eb;
        stroke-width: 3;
      }
      .hit-right {
        fill: #ffedd5;
        stroke: #ea580c;
        stroke-width: 3;
      }
      .query-fill {
        fill: #dcfce7;
        stroke: #16a34a;
        stroke-width: 2.5;
      }
      .left-fill {
        fill: #dbeafe;
        stroke: #2563eb;
        stroke-width: 2.5;
      }
      .right-fill {
        fill: #ffedd5;
        stroke: #ea580c;
        stroke-width: 2.5;
      }
      .result {
        fill: #fee2e2;
        stroke: #dc2626;
        stroke-width: 3;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1200" height="720" fill="#ffffff"/>
  <text class="title" x="600" y="42">Sparse table RMQ</text>

  <text class="small" x="600" y="76">Each entry ST[k][i] stores the position of the minimum on [i, i + 2^k)</text>

  <!-- Table geometry: first data column starts at x=202, column width=52. -->
  <g class="hand">
    <!-- Row labels. -->
    <text class="label" x="110" y="126">i</text>
    <text class="label" x="110" y="170">A[i]</text>
    <text class="label" x="110" y="222">k = 0</text>
    <text class="label" x="110" y="266">k = 1</text>
    <text class="label" x="110" y="310">k = 2</text>
    <text class="label" x="110" y="354">k = 3</text>

    <!-- Header row. -->
    <rect class="head-cell" x="202" y="106" width="52" height="34" rx="4"/><text class="code" x="228" y="123">0</text>
    <rect class="head-cell" x="254" y="106" width="52" height="34" rx="4"/><text class="code" x="280" y="123">1</text>
