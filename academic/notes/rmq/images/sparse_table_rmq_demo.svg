    <rect class="array-cell" x="566" y="150" width="52" height="34" rx="4"/><text class="code" x="592" y="167">10</text>
    <rect class="array-cell" x="618" y="150" width="52" height="34" rx="4"/><text class="code" x="644" y="167">1</text>
