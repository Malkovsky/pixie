  <!-- Query demonstration. -->
  <g class="hand">
    <text class="label" x="600" y="416">Query RMQ(1, 14): length = 13, k = floor(log2 13) = 3</text>

    <rect class="query-fill" x="254" y="446" width="676" height="38" rx="7" fill-opacity="0.45"/>
    <text class="small" x="592" y="466" fill="#15803d">query [1, 14)</text>

    <rect class="left-fill" x="254" y="510" width="416" height="42" rx="7" fill-opacity="0.65"/>
    <text class="small" x="462" y="532" fill="#1d4ed8">left block [1, 9) = ST[3][1] -> position 8</text>

    <rect class="right-fill" x="514" y="570" width="416" height="42" rx="7" fill-opacity="0.72"/>
    <text class="small" x="722" y="592" fill="#c2410c">right block [6, 14) = ST[3][6] -> position 12</text>

    <path d="M280 374 C310 406 370 430 462 510" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow-blue)" fill="none"/>
    <path d="M540 374 C580 428 650 494 722 570" stroke="#ea580c" stroke-width="2.5" marker-end="url(#arrow-orange)" fill="none"/>

    <rect x="230" y="636" width="740" height="54" rx="8" fill="#f4f4f5" stroke="#71717a" stroke-width="2.2"/>
    <text class="label" x="600" y="662">compare A[8] = 1 and A[12] = 0; answer is position 12</text>
  </g>
</svg>
