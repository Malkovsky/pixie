    <rect class="array-cell" x="982" y="150" width="52" height="34" rx="4"/><text class="code" x="1008" y="167">15</text>

    <!-- Sparse table rows. -->
    <text class="tiny" x="160" y="222">len 1</text>
    <rect class="cell" x="202" y="206" width="52" height="34" rx="4"/><text class="code" x="228" y="223">0</text>
    <rect class="cell" x="254" y="206" width="52" height="34" rx="4"/><text class="code" x="280" y="223">1</text>
    <rect class="cell" x="306" y="206" width="52" height="34" rx="4"/><text class="code" x="332" y="223">2</text>
    <rect class="cell" x="358" y="206" width="52" height="34" rx="4"/><text class="code" x="384" y="223">3</text>
    <rect class="cell" x="410" y="206" width="52" height="34" rx="4"/><text class="code" x="436" y="223">4</text>
